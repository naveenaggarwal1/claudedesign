<!-- ── Animation framework ──────────────────────────────────────────────────── -->
<script type="text/babel">

// ── Easing functions ──────────────────────────────────────────────────────────
const Easing = {
  linear: (t) => t,
  easeInQuad:    (t) => t * t,
  easeOutQuad:   (t) => t * (2 - t),
  easeInOutQuad: (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t),
  easeInCubic:    (t) => t * t * t,
  easeOutCubic:   (t) => (--t) * t * t + 1,
  easeInOutCubic: (t) => (t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1),
  easeInQuart:    (t) => t * t * t * t,
  easeOutQuart:   (t) => 1 - (--t) * t * t * t,
  easeInOutQuart: (t) => (t < 0.5 ? 8 * t * t * t * t : 1 - 8 * (--t) * t * t * t),
  easeInExpo:  (t) => (t === 0 ? 0 : Math.pow(2, 10 * (t - 1))),
  easeOutExpo: (t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t)),
  easeInOutExpo: (t) => {
    if (t === 0) return 0;
    if (t === 1) return 1;
    if (t < 0.5) return 0.5 * Math.pow(2, 20 * t - 10);
    return 1 - 0.5 * Math.pow(2, -20 * t + 10);
  },
  easeInSine:    (t) => 1 - Math.cos((t * Math.PI) / 2),
  easeOutSine:   (t) => Math.sin((t * Math.PI) / 2),
  easeInOutSine: (t) => -(Math.cos(Math.PI * t) - 1) / 2,
  easeOutBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },
  easeInBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return c3 * t * t * t - c1 * t * t;
  },
  easeInOutBack: (t) => {
    const c1 = 1.70158, c2 = c1 * 1.525;
    return t < 0.5
      ? (Math.pow(2 * t, 2) * ((c2 + 1) * 2 * t - c2)) / 2
      : (Math.pow(2 * t - 2, 2) * ((c2 + 1) * (t * 2 - 2) + c2) + 2) / 2;
  },
  easeOutElastic: (t) => {
    const c4 = (2 * Math.PI) / 3;
    if (t === 0) return 0;
    if (t === 1) return 1;
    return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
  },
};

const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

function interpolate(input, output, ease = Easing.linear) {
  return (t) => {
    if (t <= input[0]) return output[0];
    if (t >= input[input.length - 1]) return output[output.length - 1];
    for (let i = 0; i < input.length - 1; i++) {
      if (t >= input[i] && t <= input[i + 1]) {
        const span = input[i + 1] - input[i];
        const local = span === 0 ? 0 : (t - input[i]) / span;
        const easeFn = Array.isArray(ease) ? (ease[i] || Easing.linear) : ease;
        const eased = easeFn(local);
        return output[i] + (output[i + 1] - output[i]) * eased;
      }
    }
    return output[output.length - 1];
  };
}

function animate({ from = 0, to = 1, start = 0, end = 1, ease = Easing.easeInOutCubic }) {
  return (t) => {
    if (t <= start) return from;
    if (t >= end) return to;
    const local = (t - start) / (end - start);
    return from + (to - from) * ease(local);
  };
}

// ── Timeline context ──────────────────────────────────────────────────────────
const TimelineContext = React.createContext({ time: 0, duration: 10, playing: false });
const useTime = () => React.useContext(TimelineContext).time;
const useTimeline = () => React.useContext(TimelineContext);

// ── Sprite ────────────────────────────────────────────────────────────────────
const SpriteContext = React.createContext({ localTime: 0, progress: 0, duration: 0 });
const useSprite = () => React.useContext(SpriteContext);

function Sprite({ start = 0, end = Infinity, children, keepMounted = false }) {
  const { time } = useTimeline();
  const visible = time >= start && time <= end;
  if (!visible && !keepMounted) return null;

  const duration = end - start;
  const localTime = Math.max(0, time - start);
  const progress = duration > 0 && isFinite(duration)
    ? clamp(localTime / duration, 0, 1)
    : 0;

  const value = { localTime, progress, duration, visible };

  return (
    <SpriteContext.Provider value={value}>
      {typeof children === 'function' ? children(value) : children}
    </SpriteContext.Provider>
  );
}

// ── Stage ─────────────────────────────────────────────────────────────────────
function Stage({
  width = 1280,
  height = 720,
  duration = 10,
  background = '#f6f4ef',
  loop = true,
  autoplay = true,
  persistKey = 'animstage',
  children,
}) {
  const [time, setTime] = React.useState(() => {
    try {
      const v = parseFloat(localStorage.getItem(persistKey + ':t') || '0');
      return isFinite(v) ? clamp(v, 0, duration) : 0;
    } catch { return 0; }
  });
  const [playing, setPlaying] = React.useState(autoplay);
  const [hoverTime, setHoverTime] = React.useState(null);
  const [scale, setScale] = React.useState(1);

  const stageRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const lastTsRef = React.useRef(null);

  React.useEffect(() => {
    try { localStorage.setItem(persistKey + ':t', String(time)); } catch {}
  }, [time, persistKey]);

  React.useEffect(() => {
    if (!stageRef.current) return;
    const el = stageRef.current;
    const measure = () => {
      const barH = 44;
      const s = Math.min(el.clientWidth / width, (el.clientHeight - barH) / height);
      setScale(Math.max(0.05, s));
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    window.addEventListener('resize', measure);
    return () => { ro.disconnect(); window.removeEventListener('resize', measure); };
  }, [width, height]);

  React.useEffect(() => {
    if (!playing) { lastTsRef.current = null; return; }
    const step = (ts) => {
      if (lastTsRef.current == null) lastTsRef.current = ts;
      const dt = (ts - lastTsRef.current) / 1000;
      lastTsRef.current = ts;
      setTime((t) => {
        let next = t + dt;
        if (next >= duration) {
          if (loop) next = next % duration;
          else { next = duration; setPlaying(false); }
        }
        return next;
      });
      rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      lastTsRef.current = null;
    };
  }, [playing, duration, loop]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      if (e.code === 'Space') {
        e.preventDefault();
        setPlaying(p => !p);
      } else if (e.code === 'ArrowLeft') {
        setTime(t => clamp(t - (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.code === 'ArrowRight') {
        setTime(t => clamp(t + (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.key === '0' || e.code === 'Home') {
        setTime(0);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [duration]);

  const displayTime = hoverTime != null ? hoverTime : time;
  const ctxValue = React.useMemo(
    () => ({ time: displayTime, duration, playing, setTime, setPlaying }),
    [displayTime, duration, playing]
  );

  return (
    <div ref={stageRef} style={{
      position: 'absolute', inset: 0,
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      background: '#0a0a0a',
      fontFamily: 'Inter, system-ui, sans-serif',
    }}>
      <div style={{
        flex: 1, width: '100%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        overflow: 'hidden', minHeight: 0,
      }}>
        <div ref={canvasRef} style={{
          width, height, background,
          position: 'relative',
          transform: `scale(${scale})`,
          transformOrigin: 'center',
          flexShrink: 0,
          boxShadow: '0 20px 60px rgba(0,0,0,0.4)',
          overflow: 'hidden',
        }}>
          <TimelineContext.Provider value={ctxValue}>
            {children}
          </TimelineContext.Provider>
        </div>
      </div>
      <PlaybackBar
        time={displayTime}
        duration={duration}
        playing={playing}
        onPlayPause={() => setPlaying(p => !p)}
        onReset={() => setTime(0)}
        onSeek={(t) => setTime(t)}
        onHover={(t) => setHoverTime(t)}
      />
    </div>
  );
}

// ── Playback bar ──────────────────────────────────────────────────────────────
function PlaybackBar({ time, duration, playing, onPlayPause, onReset, onSeek, onHover }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);

  const timeFromEvent = React.useCallback((e) => {
    const rect = trackRef.current.getBoundingClientRect();
    const x = clamp((e.clientX - rect.left) / rect.width, 0, 1);
    return x * duration;
  }, [duration]);

  const onTrackMove = (e) => {
    if (!trackRef.current) return;
    const t = timeFromEvent(e);
    if (dragging) onSeek(t);
    else onHover(t);
  };

  const onTrackLeave = () => { if (!dragging) onHover(null); };

  const onTrackDown = (e) => {
    setDragging(true);
    onSeek(timeFromEvent(e));
    onHover(null);
  };

  React.useEffect(() => {
    if (!dragging) return;
    const onUp = () => setDragging(false);
    const onMove = (e) => { if (trackRef.current) onSeek(timeFromEvent(e)); };
    window.addEventListener('mouseup', onUp);
    window.addEventListener('mousemove', onMove);
    return () => { window.removeEventListener('mouseup', onUp); window.removeEventListener('mousemove', onMove); };
  }, [dragging, timeFromEvent, onSeek]);

  const pct = duration > 0 ? (time / duration) * 100 : 0;
  const fmt = (t) => {
    const total = Math.max(0, t);
    const m = Math.floor(total / 60);
    const s = Math.floor(total % 60);
    const cs = Math.floor((total * 100) % 100);
    return `${String(m).padStart(1, '0')}:${String(s).padStart(2, '0')}.${String(cs).padStart(2, '0')}`;
  };
  const mono = 'IBM Plex Mono, ui-monospace, monospace';

  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12,
      padding: '8px 16px',
      background: 'rgba(20,20,20,0.92)',
      borderTop: '1px solid rgba(255,255,255,0.08)',
      width: '100%', maxWidth: 680, alignSelf: 'center',
      borderRadius: 8, color: '#f6f4ef',
      fontFamily: 'IBM Plex Sans, system-ui, sans-serif',
      userSelect: 'none', flexShrink: 0,
    }}>
      <IconButton onClick={onReset} title="Return to start (0)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 2v10M12 2L5 7l7 5V2z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
        </svg>
      </IconButton>
      <IconButton onClick={onPlayPause} title="Play/pause (space)">
        {playing ? (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="3" y="2" width="3" height="10" fill="currentColor"/>
            <rect x="8" y="2" width="3" height="10" fill="currentColor"/>
          </svg>
        ) : (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 2l9 5-9 5V2z" fill="currentColor"/>
          </svg>
        )}
      </IconButton>
      <div style={{
        fontFamily: mono, fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'right', color: '#f6f4ef',
      }}>
        {fmt(time)}
      </div>
      <div ref={trackRef}
        onMouseMove={onTrackMove}
        onMouseLeave={onTrackLeave}
        onMouseDown={onTrackDown}
        style={{
          flex: 1, height: 22, position: 'relative',
          cursor: 'pointer', display: 'flex', alignItems: 'center',
        }}
      >
        <div style={{
          position: 'absolute', left: 0, right: 0, height: 4,
          background: 'rgba(255,255,255,0.12)', borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute', left: 0, width: `${pct}%`, height: 4,
          background: 'oklch(72% 0.12 250)', borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute', left: `${pct}%`, top: '50%',
          width: 12, height: 12, marginLeft: -6, marginTop: -6,
          background: '#fff', borderRadius: 6,
          boxShadow: '0 2px 4px rgba(0,0,0,0.4)',
        }}/>
      </div>
      <div style={{
        fontFamily: mono, fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'left',
        color: 'rgba(246,244,239,0.55)',
      }}>
        {fmt(duration)}
      </div>
    </div>
  );
}

function IconButton({ children, onClick, title }) {
  const [hover, setHover] = React.useState(false);
  return (
    <button onClick={onClick} title={title}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        width: 28, height: 28,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        background: hover ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.04)',
        border: '1px solid rgba(255,255,255,0.1)',
        borderRadius: 6, color: '#f6f4ef',
        cursor: 'pointer', padding: 0,
        transition: 'background 120ms',
      }}
    >
      {children}
    </button>
  );
}

// ── Scene palette + type ──────────────────────────────────────────────────────
const PALETTE = {
  bg: '#f4ede0',
  bgDeep: '#e8dcc4',
  ink: '#0e2436',
  blue: '#2a6fa5',
  blueDeep: '#143654',
  blueLight: '#7fb3d5',
  white: '#ffffff',
  accent: '#c97f4a',
};

const SERIF = '"Cormorant Garamond", "EB Garamond", Georgia, serif';
const SANS  = '"IBM Plex Sans", "Helvetica Neue", sans-serif';
const MONO  = '"IBM Plex Mono", ui-monospace, monospace';

// ── Shared components ─────────────────────────────────────────────────────────

function WaveLayer({ amplitude, wavelength, phase, y, color, opacity, time, width = 1920 }) {
  const points = [];
  const step = 12;
  for (let x = 0; x <= width; x += step) {
    const yy = y + Math.sin((x / wavelength) + phase + time) * amplitude;
    points.push(`${x},${yy}`);
  }
  const path = `M0,${y + amplitude * 2} L${points.join(' L')} L${width},${y + amplitude * 2} Z`;
  return <path d={path} fill={color} opacity={opacity} />;
}

function Fish({ x, y, scale = 1, dir = 1, color = PALETTE.ink }) {
  return (
    <g transform={`translate(${x},${y}) scale(${dir * scale}, ${scale})`}>
      <path d="M0 0 Q-12 -6 -22 0 Q-12 6 0 0 Z" fill="none" stroke={color} strokeWidth="1.5" />
      <path d="M-22 0 L-30 -5 L-30 5 Z" fill="none" stroke={color} strokeWidth="1.5" />
      <circle cx="-3" cy="-1.5" r="0.8" fill={color} />
    </g>
  );
}

function Bubble({ x, y, r, opacity = 1 }) {
  return (
    <circle cx={x} cy={y} r={r} fill="none" stroke={PALETTE.blueLight} strokeWidth="1" opacity={opacity} />
  );
}

// ─── SCENE 1: Cold open (0–5s) ────────────────────────────────────────────────

function Scene1ColdOpen() {
  const { localTime } = useSprite();
  const t = localTime;

  const titleOpacity = interpolate([0, 0.6, 4.0, 4.8], [0, 1, 1, 0], Easing.easeOutCubic)(t);
  const titleY = interpolate([0, 0.8], [30, 0], Easing.easeOutCubic)(t);
  const subOpacity = interpolate([0.7, 1.4, 4.0, 4.8], [0, 1, 1, 0], Easing.easeOutCubic)(t);
  const cameraScale = interpolate([0, 5], [1.0, 1.06], Easing.linear)(t);

  return (
    <div style={{ position: 'absolute', inset: 0, background: PALETTE.bg, overflow: 'hidden' }}>
      <div style={{
        position: 'absolute', inset: 0,
        background: `linear-gradient(180deg, ${PALETTE.bg} 0%, ${PALETTE.bg} 45%, #d4dde4 60%, #a8c5d8 100%)`,
        transform: `scale(${cameraScale})`,
        transformOrigin: 'center bottom',
      }} />

      <svg viewBox="0 0 1920 1080" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }}>
        <WaveLayer y={680} amplitude={18} wavelength={140} phase={0} color={PALETTE.blueLight} opacity={0.45} time={t * 0.8} />
        <WaveLayer y={750} amplitude={22} wavelength={180} phase={1.2} color={PALETTE.blue} opacity={0.55} time={t * 0.9} />
        <WaveLayer y={830} amplitude={28} wavelength={220} phase={2.4} color={PALETTE.blueDeep} opacity={0.85} time={t * 0.7} />
        <WaveLayer y={920} amplitude={34} wavelength={260} phase={0.8} color={PALETTE.ink} opacity={1} time={t * 0.6} />
      </svg>

      <div style={{
        position: 'absolute', left: 0, right: 0, top: 540,
        height: 1, background: PALETTE.ink, opacity: 0.18,
      }} />

      <div style={{
        position: 'absolute', top: 80, left: 120,
        fontFamily: MONO, fontSize: 14, letterSpacing: '0.24em',
        textTransform: 'uppercase', color: PALETTE.ink, opacity: subOpacity * 0.7,
      }}>
        ↳ Dispatch № 01 · Mediterranean
      </div>

      <div style={{
        position: 'absolute', top: 280, left: 120, right: 120,
        opacity: titleOpacity,
        transform: `translateY(${titleY}px)`,
      }}>
        <div style={{
          fontFamily: SERIF, fontSize: 128, fontWeight: 400,
          color: PALETTE.ink, lineHeight: 1.02,
          letterSpacing: '-0.02em', fontStyle: 'italic',
        }}>
          The AI compute race
        </div>
        <div style={{
          fontFamily: SERIF, fontSize: 128, fontWeight: 400,
          color: PALETTE.ink, lineHeight: 1.02,
          letterSpacing: '-0.02em',
        }}>
          is going <span style={{ color: PALETTE.blue, fontStyle: 'italic' }}>underwater.</span>
        </div>
      </div>

      <div style={{
        position: 'absolute', top: 540, left: 120,
        fontFamily: SANS, fontSize: 18, letterSpacing: '0.04em',
        color: PALETTE.ink, opacity: subOpacity * 0.75, fontWeight: 400,
      }}>
        A field report on the Mediterranean's coldest server farms.
      </div>
    </div>
  );
}

// ─── SCENE 2: The Problem (5–15s) ─────────────────────────────────────────────

function DatacenterIcon({ x, y, heat = 0, lit = false }) {
  const heatColor = `rgba(201, 127, 74, ${heat})`;
  return (
    <g transform={`translate(${x},${y})`}>
      {heat > 0 && (
        <ellipse cx="60" cy="-20" rx={70 + heat * 30} ry={20 + heat * 15}
          fill="none" stroke={heatColor} strokeWidth="1" opacity={heat * 0.6} />
      )}
      {heat > 0.3 && [0, 1, 2].map(i => (
        <path key={i}
          d={`M${30 + i * 25} 0 Q${28 + i * 25} ${-30 - heat * 40} ${32 + i * 25} ${-60 - heat * 50}`}
          stroke={heatColor} strokeWidth="1.5" fill="none" opacity={heat * 0.7}
          strokeDasharray="3 4" />
      ))}
      <line x1="0" y1="0" x2="120" y2="0" stroke={PALETTE.ink} strokeWidth="2" />
      <rect x="0" y="0" width="120" height="100" fill={lit ? '#fff5e8' : 'transparent'}
        stroke={PALETTE.ink} strokeWidth="2" />
      {[0, 1, 2, 3, 4, 5].map(i => (
        <g key={i}>
          <line x1="12" y1={14 + i * 14} x2="108" y2={14 + i * 14}
            stroke={PALETTE.ink} strokeWidth="1" opacity="0.5" />
          <circle cx="20" cy={14 + i * 14} r="2"
            fill={lit ? PALETTE.accent : 'transparent'}
            opacity={lit ? 0.6 + 0.4 * Math.sin(i + heat * 8) : 0} />
        </g>
      ))}
      <line x1="-10" y1="100" x2="130" y2="100" stroke={PALETTE.ink} strokeWidth="2" />
    </g>
  );
}

function Scene2Problem() {
  const { localTime } = useSprite();
  const t = localTime;

  const headlineOpacity = interpolate([0, 0.5, 9.0, 10], [0, 1, 1, 0], Easing.easeOutCubic)(t);
  const counterStart = 1.5;
  const counterT = clamp((t - counterStart) / 1.6, 0, 1);
  const counterValue = Easing.easeOutQuart(counterT) * 945;
  const heatProgress = clamp((t - 3.5) / 4.5, 0, 1);
  const dcStarts = [3.8, 4.2, 4.6, 5.0, 5.4];
  const camY = interpolate([0, 3, 5], [0, 0, -60], Easing.easeInOutCubic)(t);
  const camScale = interpolate([0, 3, 5, 10], [1, 1, 1.05, 1.1], Easing.easeInOutCubic)(t);
  const consumeOpacity = interpolate([8.0, 8.7, 9.3, 10], [0, 1, 1, 0], Easing.easeOutCubic)(t);

  return (
    <div style={{ position: 'absolute', inset: 0, background: PALETTE.bg }}>

          <rect x={rx} y="-50" width="22" height="100"

    </g>
  );
}

function CurrentArrow({ x, y, dir = 1, opacity = 1, length = 80 }) {
  const x2 = x + dir * length;
  return (
    <g opacity={opacity}>
      <path d={`M${x} ${y} Q${x + dir * length / 2} ${y - 6} ${x2} ${y}`}
        stroke={PALETTE.blue} strokeWidth="1.5" fill="none" />
      <path d={`M${x2} ${y} L${x2 - dir * 8} ${y - 4} M${x2} ${y} L${x2 - dir * 8} ${y + 4}`}
        stroke={PALETTE.blue} strokeWidth="1.5" fill="none" />
    </g>
  );
}

function StatCard({ index, value, suffix, label, sublabel, t, startTime }) {
  const local = t - startTime;
  const slideIn = clamp(local / 0.7, 0, 1);
  const slideEased = Easing.easeOutCubic(slideIn);
  const opacity = clamp(local / 0.5, 0, 1);
  const tx = (1 - slideEased) * 80;
  const counterT = clamp((local - 0.4) / 1.2, 0, 1);

  return (
    <div style={{
      position: 'absolute',
      left: 160 + index * 540,
      top: 280,
      width: 480,
      opacity,
      transform: `translateX(${tx}px)`,
    }}>
      <div style={{
        fontFamily: MONO, fontSize: 13, letterSpacing: '0.24em',
        color: PALETTE.ink, opacity: 0.45, marginBottom: 24,

        № {String(index + 1).padStart(2, '0')}
      </div>

      <div style={{ whiteSpace: 'nowrap', display: 'flex', alignItems: 'flex-end', gap: 56 }}>
        <span style={{
          fontFamily: SERIF, fontSize: 220, fontWeight: 400,
          color: PALETTE.ink, lineHeight: 0.9, letterSpacing: '-0.02em',
          fontVariantNumeric: 'tabular-nums', display: 'inline-block',
        }}>
          {(value * Easing.easeOutQuart(counterT)).toFixed(0)}
        </span>
        <span style={{
          fontFamily: SERIF, fontSize: 90, lineHeight: 1.2,
          fontStyle: 'italic', color: PALETTE.blue, letterSpacing: '0',
          display: 'inline-block', paddingBottom: 22, paddingLeft: 24,
        }}>{suffix}</span>
      </div>

      <div style={{
        height: 1, background: PALETTE.ink, opacity: 0.3,
        width: '100%', marginTop: 32, marginBottom: 24,
        transform: `scaleX(${slideEased})`, transformOrigin: 'left',
      }} />

        fontFamily: SERIF, fontSize: 36, fontStyle: 'italic',
        color: PALETTE.ink, lineHeight: 1.15, letterSpacing: '-0.01em',

        fontFamily: SANS, fontSize: 14, color: PALETTE.ink,
        opacity: 0.6, marginTop: 16, lineHeight: 1.5,

    </div>
  );
}

        <div style={{
          width: 160, height: 56,
          border: `1.5px dashed ${PALETTE.ink}`,
          borderRadius: 4,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontFamily: MONO, fontSize: 11,
          letterSpacing: '0.2em', textTransform: 'uppercase',
          color: PALETTE.ink, opacity: 0.55,
        }}>
          [ logo ]
        </div>
      </div>

      <div style={{
        position: 'absolute', bottom: 80, left: 120,
        fontFamily: MONO, fontSize: 12, letterSpacing: '0.22em',
        textTransform: 'uppercase', color: PALETTE.ink, opacity: logoFade * 0.5,
      }}>
        End of dispatch.
      </div>
    </div>
  );
}

// ─── Root ─────────────────────────────────────────────────────────────────────

function TimestampLabel() {
  const time = useTime();
  React.useEffect(() => {
    const root = document.getElementById('video-root');
    if (root) {
      const sec = Math.floor(time);
      root.setAttribute('data-screen-label', `t=${sec}s`);
    }
  }, [Math.floor(time)]);
  return null;
}

function Video() {
  return (
    <div id="video-root" data-screen-label="t=0s" style={{ position: 'absolute', inset: 0 }}>
      <Stage width={1920} height={1080} duration={45} background={PALETTE.bg} persistKey="underwater-dc">
        <TimestampLabel />
        <Sprite start={0} end={5}>
          <Scene1ColdOpen />
        </Sprite>
        <Sprite start={5} end={15}>
          <Scene2Problem />
        </Sprite>
        <Sprite start={15} end={30}>
          <Scene3Solution />
        </Sprite>
        <Sprite start={30} end={40}>
          <Scene4Stats />
        </Sprite>
        <Sprite start={40} end={45}>
          <Scene5Closing />
        </Sprite>
      </Stage>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Video />);

</script>
</body>
</html>
